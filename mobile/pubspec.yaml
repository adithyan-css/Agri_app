name: agri_app
description: AgriPrice AI Mobile App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.3
  dio: ^5.3.3
  fl_chart: ^0.65.0
  shared_preferences: ^2.2.2
  geolocator: ^10.1.0
  intl: ^0.20.2
  google_fonts: ^6.1.0
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  go_router: ^17.1.0
  speech_to_text: ^7.3.0
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/icons/
