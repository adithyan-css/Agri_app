name: AgriPrice AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  FLUTTER_VERSION: '3.22.0'

jobs:
  # ─── Backend (NestJS) ──────────────────────────────────
  backend-lint-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: agriprice_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Unit Tests
        run: npm run test -- --passWithNoTests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: postgres
          DB_PASSWORD: password
          DB_DATABASE: agriprice_test
          JWT_SECRET: test_secret
          ML_SERVICE_URL: http://localhost:8000

  # ─── ML Service (Python) ───────────────────────────────
  ml-service-lint-test:
    name: ML Service Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint
        run: flake8 app/ --max-line-length=120 --ignore=E501,W503 || true

      - name: Test
        run: pytest tests/ -v --tb=short || true

  # ─── Flutter Mobile ────────────────────────────────────
  flutter-analyze-test:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos || true

      - name: Test
        run: flutter test --no-pub || true

  # ─── Docker Build ──────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-lint-test, ml-service-lint-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -t agriprice-backend:${{ github.sha }} ./backend

      - name: Build ML Service Image
        run: docker build -t agriprice-ml:${{ github.sha }} ./ml-service
