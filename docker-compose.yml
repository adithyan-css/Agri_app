version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: agriprice-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agriprice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d agriprice" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agriprice-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: agriprice-ml
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    # healthcheck could be added here pointing to an /health endpoint

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agriprice-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=user
      - DATABASE_PASSWORD=password
      - DATABASE_NAME=agriprice
      - REDIS_URL=redis://redis:6379
      - ML_SERVICE_URL=http://ml-service:8000
      - JWT_SECRET=super_secret_jwt_key
      - OPENWEATHER_API_KEY=mock_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ml-service:
        condition: service_started

volumes:
  pgdata:
  redisdata:
