version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: agriprice-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agriprice
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d agriprice" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agriprice-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: agriprice-ml
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    # healthcheck could be added here pointing to an /health endpoint

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agriprice-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_DATABASE=agriprice
      - ML_SERVICE_URL=http://ml-service:8000
      - JWT_SECRET=${JWT_SECRET:-agriprice_secret_2026_!@#}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - DB_SYNC=true
    depends_on:
      db:
        condition: service_healthy
      ml-service:
        condition: service_started
    volumes:
      - C:\Users\adith\Downloads\archive:/usr/src/app/dataset:ro

volumes:
  pgdata:
  redisdata:
