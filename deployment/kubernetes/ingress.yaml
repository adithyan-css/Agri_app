apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agriprice-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit-connections: "10"
spec:
  tls:
    - hosts:
        - api.agriprice.example.com
      secretName: agriprice-tls
  rules:
    - host: api.agriprice.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agriprice-backend
                port:
                  number: 3000
          - path: /predict
            pathType: Prefix
            backend:
              service:
                name: agriprice-ml-service
                port:
                  number: 8000